name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Install dependencies
        run: uv sync --extra agents --extra dev --extra serve --extra groq --extra huggingface --extra ollama

      - name: Run pytest
        run: uv run pytest tests/ -v

      - name: Run mypy
        run: uv run mypy duckclaw/

      - name: Validate SQL
        run: uv run python scripts/validate_sql.py
